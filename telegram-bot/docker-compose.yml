name: qanon-sa-bot

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
      - ./scripts/pull_ollama_models.sh:/usr/local/bin/pull_models.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        SERVE_PID=$!
        sleep 3
        sh /usr/local/bin/pull_models.sh || true
        wait $SERVE_PID
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./kb:/app/kb
    command: ["sh", "-c", "alembic upgrade head && python -m scripts.ingest_kb --if-empty && python -m app.main_bot"]

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    expose:
      - "8000"
    command:
      - sh
      - -c
      - >
        alembic upgrade head
        && python -m scripts.seed_admin
        && uvicorn app.main_admin:app --host 0.0.0.0 --port 8000 --proxy-headers

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - admin
    ports:
      - "80:80"
    volumes:
      - ./nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata: {}
  ollama_models: {}
