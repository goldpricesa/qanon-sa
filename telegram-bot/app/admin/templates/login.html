{% extends "base.html" %}
{% block title %}تسجيل الدخول{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-6 rounded shadow">
  <h1 class="text-xl font-bold mb-4">تسجيل الدخول</h1>
  {% if error %}
  <div class="mb-3 text-red-600 text-sm">بيانات الدخول غير صحيحة.</div>
  {% endif %}
  <form action="{{ base_path }}/login" method="post" class="space-y-3">
    <div>
      <label class="block text-sm mb-1">اسم المستخدم</label>
      <input class="w-full border rounded p-2" name="username" required />
    </div>
    <div>
      <label class="block text-sm mb-1">كلمة المرور</label>
      <input class="w-full border rounded p-2" type="password" name="password" required />
    </div>
    <button class="w-full bg-slate-800 text-white rounded p-2 hover:bg-slate-700" type="submit">دخول</button>
  </form>
</div>
{% endblock %}
