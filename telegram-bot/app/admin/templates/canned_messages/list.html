{% extends "base.html" %}
{% block title %}الردود الجاهزة{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">الردود الجاهزة</h1>

{% for r in rows %}
<div class="bg-white p-4 rounded shadow mb-3">
  <h3 class="font-bold text-sm mb-2">{{ r.key }}</h3>
  <form method="post" action="{{ base_path }}/canned-messages/{{ r.key }}" class="space-y-2">
    <input type="hidden" name="csrf" value="{{ csrf_token }}" />
    <textarea class="w-full border rounded p-2 text-sm" name="content_ar" rows="3">{{ r.content_ar }}</textarea>
    {% if r.default and r.default != r.content_ar %}
    <details class="text-xs text-slate-500">
      <summary>القيمة الافتراضية</summary>
      <pre class="whitespace-pre-wrap mt-1">{{ r.default }}</pre>
    </details>
    {% endif %}
    <button class="bg-slate-800 text-white rounded px-3 py-1 text-sm" type="submit">حفظ</button>
  </form>
</div>
{% endfor %}
{% endblock %}
