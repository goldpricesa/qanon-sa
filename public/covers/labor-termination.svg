<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#0F4C5C"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <circle cx="980" cy="140" r="180" fill="url(#glow)"/>
  <circle cx="200" cy="520" r="200" fill="url(#glow)"/>

  <g transform="translate(600 250)" stroke="#5EEAD4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="0" y1="-110" x2="0" y2="120" stroke-width="8"/>
    <line x1="-200" y1="-60" x2="200" y2="-60" stroke-width="8"/>

    <line x1="-150" y1="-60" x2="-200" y2="20" stroke-width="5" stroke-opacity="0.85"/>
    <line x1="-100" y1="-60" x2="-150" y2="20" stroke-width="5" stroke-opacity="0.85"/>
    <path d="M-220 20 Q-175 70 -130 20 Z" fill="#5EEAD4" fill-opacity="0.18" stroke-width="6"/>

    <line x1="100" y1="-60" x2="60" y2="60" stroke-width="5" stroke-opacity="0.85"/>
    <line x1="150" y1="-60" x2="110" y2="60" stroke-width="5" stroke-opacity="0.85"/>
    <path d="M40 60 Q85 110 130 60 Z" fill="#5EEAD4" fill-opacity="0.35" stroke-width="6"/>

    <circle cx="0" cy="-110" r="14" fill="#5EEAD4" stroke="none"/>
    <rect x="-60" y="120" width="120" height="14" rx="6" fill="#5EEAD4" stroke="none"/>
    <rect x="-30" y="134" width="60" height="20" rx="6" fill="#5EEAD4" stroke="none"/>
  </g>

  <text x="600" y="490" text-anchor="middle" font-family="'Tajawal', system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff" direction="rtl">الفصل التعسفي</text>
  <text x="600" y="555" text-anchor="middle" font-family="'Tajawal', system-ui, sans-serif" font-size="28" fill="#99F6E4" direction="rtl">حقوق العامل والتعويض في نظام العمل</text>
</svg>
